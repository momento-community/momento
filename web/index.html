<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="momento">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>momento</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Google Maps JS SDK — required by `google_maps_flutter_web`. The
    `__GOOGLE_MAPS_KEY_WEB__` token is replaced post-build by CI
    (.github/workflows/deploy-hosting.yml) with the value of the
    GOOGLE_MAPS_KEY_WEB secret. For local dev, replace it manually or run
    `tool/inject_maps_key.sh` (see CLAUDE.md → Common commands). When the
    token is left in place, the map widget renders a neutral grey area —
    safe for mock-mode e2e runs that don't ship a key.
  -->
  <script async defer
          src="https://maps.googleapis.com/maps/api/js?key=__GOOGLE_MAPS_KEY_WEB__&libraries=places&v=weekly"></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
