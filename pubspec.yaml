name: momento
description: "Momentō — Find what's happening around you, right now."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any
  firebase_app_check: any
  cloud_functions: any

  # Auth providers — Apple deferred to v2 alongside iOS launch.
  google_sign_in: ^6.2.2

  # State + navigation
  flutter_riverpod: any
  riverpod_annotation: any
  go_router: any

  # UI
  google_fonts: any
  lucide_icons_flutter: any
  flutter_staggered_grid_view: any
  cached_network_image: any

  # Maps + geo
  google_maps_flutter: any
  geoflutterfire_plus: any
  geolocator: any

  # Forms / data
  freezed_annotation: any
  json_annotation: any
  intl: any
  image_picker: any
  url_launcher: any
  uuid: any
  shared_preferences: any
  http: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: any
  freezed: any
  json_serializable: any
  riverpod_generator: any

  # Testing — fake_cloud_firestore implements the full Firestore API in
  # memory (transactions, queries, snapshots) so repository tests run
  # without an emulator. mocktail covers everything else (repo doubles
  # in widget tests, etc.).
  fake_cloud_firestore: any
  mocktail: any

flutter:
  uses-material-design: true
  assets:
    - assets/images/
