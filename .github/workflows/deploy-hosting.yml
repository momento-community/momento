name: Deploy Hosting

# Auth: FIREBASE_TOKEN secret (firebase login:ci output) — see CLAUDE.md.
on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "web/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-hosting.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.38.x"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        env:
          GOOGLE_MAPS_KEY_WEB: ${{ secrets.GOOGLE_MAPS_KEY_WEB }}
          APP_CHECK_RECAPTCHA_SITE_KEY: ${{ secrets.APP_CHECK_RECAPTCHA_SITE_KEY }}
        run: |
          flutter build web --release \
            --no-tree-shake-icons \
            --dart-define=GOOGLE_MAPS_KEY_WEB="$GOOGLE_MAPS_KEY_WEB" \
            --dart-define=APP_CHECK_RECAPTCHA_SITE_KEY="$APP_CHECK_RECAPTCHA_SITE_KEY"

      - name: Inject Google Maps web key into index.html
        env:
          GOOGLE_MAPS_KEY_WEB: ${{ secrets.GOOGLE_MAPS_KEY_WEB }}
        run: |
          if [ -z "$GOOGLE_MAPS_KEY_WEB" ]; then
            echo "::warning::GOOGLE_MAPS_KEY_WEB secret is empty — Maps will not render."
          fi
          sed -i "s|__GOOGLE_MAPS_KEY_WEB__|${GOOGLE_MAPS_KEY_WEB}|g" build/web/index.html
          # Sanity check: token should be gone (or empty if secret was empty).
          ! grep -q "__GOOGLE_MAPS_KEY_WEB__" build/web/index.html

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        # Pin to a version known to accept `firebase login:ci` tokens. Newer
        # majors are migrating to WIF / service-account-only auth.
        run: npm install -g firebase-tools@13.29.x

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        # `set -o pipefail` is critical: without it, `firebase deploy ...
        # | tail -120` returns tail's exit code (always 0), so an auth /
        # deploy failure looks "green" in the Actions UI. See the
        # matching comment in deploy-rules.yml.
        shell: bash
        run: |
          set -e -o pipefail
          firebase --version
          firebase deploy \
            --only hosting \
            --project momento-b23c0 \
            --non-interactive \
            --debug 2>&1 | tail -120

      # Slack ping on failure. No-op when CI_FAILURE_WEBHOOK_URL isn't set.
      # Mirrors the step in e2e.yml — see that file for setup notes.
      - name: Notify webhook on failure
        if: failure() && github.event_name != 'pull_request' && env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.CI_FAILURE_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "{\"text\":\"❌ Deploy Hosting failed on \`${{ github.ref_name }}\` — <${RUN_URL}|view run>\nCommit: \`${{ github.sha }}\` by ${{ github.actor }}\"}" \
            "$WEBHOOK_URL" || echo "Webhook POST failed; not blocking the run."
