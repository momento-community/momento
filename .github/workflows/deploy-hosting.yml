name: Deploy Hosting

# Auth: FIREBASE_TOKEN secret (firebase login:ci output) — see CLAUDE.md.
on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "web/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-hosting.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.38.x"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        env:
          GOOGLE_MAPS_KEY_WEB: ${{ secrets.GOOGLE_MAPS_KEY_WEB }}
        run: |
          flutter build web --release \
            --no-tree-shake-icons \
            --dart-define=GOOGLE_MAPS_KEY_WEB="$GOOGLE_MAPS_KEY_WEB"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        # Pin to a version known to accept `firebase login:ci` tokens. Newer
        # majors are migrating to WIF / service-account-only auth.
        run: npm install -g firebase-tools@13.29.x

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase --version
          firebase deploy \
            --only hosting \
            --project momento-b23c0 \
            --non-interactive \
            --debug 2>&1 | tail -120
