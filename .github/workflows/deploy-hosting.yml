name: Deploy Hosting

on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "web/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "firebase.json"
      - ".github/workflows/deploy-hosting.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.38.x"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        env:
          GOOGLE_MAPS_KEY_WEB: ${{ secrets.GOOGLE_MAPS_KEY_WEB }}
        run: |
          flutter build web --release \
            --no-tree-shake-icons \
            --dart-define=GOOGLE_MAPS_KEY_WEB="$GOOGLE_MAPS_KEY_WEB"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MOMENTO_B23C0 }}
          projectId: momento-b23c0
          channelId: live
