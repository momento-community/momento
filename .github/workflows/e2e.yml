name: e2e (Playwright)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright on Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.38.x"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build web (mock data — no Firebase calls)
        run: |
          flutter build web --release \
            --no-tree-shake-icons \
            --dart-define=USE_MOCK_DATA=true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No npm cache: e2e/package-lock.json is intentionally not committed
          # since the runner installs from package.json each time. Add a lock
          # file later if install time becomes a bottleneck.

      - name: Install Playwright deps
        working-directory: e2e
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Serve build/web
        run: |
          npx -y http-server build/web -p 8080 -s &
          npx -y wait-on http://localhost:8080 -t 30000

      # Smoke + Discover + Filter + Map + Roles + Social + Profile run in CI
      # against the mock-data build (no Firebase calls). Auth / Create flows
      # and any test that needs a real signed-in user (full Like/Follow
      # round-trip) live behind the Firebase emulator — see e2e/PLAN.md P3.
      - name: Run Playwright (mock-mode suites)
        working-directory: e2e
        env:
          BASE_URL: http://localhost:8080
        run: |
          npm run test -- \
            smoke.spec.ts discover.spec.ts filter.spec.ts map.spec.ts \
            roles.spec.ts social.spec.ts profile.spec.ts \
            --reporter=list,html

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

      - name: Upload traces & videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results
          retention-days: 7
