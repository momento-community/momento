name: e2e (Playwright)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Nightly run (04:00 UTC = 06:00 Brussels) catches transitive-dep
    # regressions — Playwright / Flutter SDK security releases that don't
    # ship with our changes but break our build.
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright on Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.38.x"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build web (mock data — no Firebase calls)
        run: |
          flutter build web --release \
            --no-tree-shake-icons \
            --dart-define=USE_MOCK_DATA=true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No npm cache: e2e/package-lock.json is intentionally not committed
          # since the runner installs from package.json each time. Add a lock
          # file later if install time becomes a bottleneck.

      - name: Install Playwright deps
        working-directory: e2e
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Serve build/web
        run: |
          npx -y http-server build/web -p 8080 -s &
          npx -y wait-on http://localhost:8080 -t 30000

      # Smoke + Discover + Filter + Map + Roles + Social + Profile run in CI
      # against the mock-data build (no Firebase calls). Auth / Create flows
      # and any test that needs a real signed-in user (full Like/Follow
      # round-trip) live behind the Firebase emulator — see e2e/PLAN.md P3.
      - name: Run Playwright (mock-mode suites)
        working-directory: e2e
        env:
          BASE_URL: http://localhost:8080
        run: |
          npm run test -- \
            smoke.spec.ts discover.spec.ts filter.spec.ts map.spec.ts \
            roles.spec.ts social.spec.ts profile.spec.ts \
            responsive.spec.ts \
            --reporter=list,html

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

      - name: Upload traces & videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results
          retention-days: 7

      # Notify a webhook on red main / scheduled-run failures. Skipped when
      # the secret isn't set, so this is a no-op until you add it.
      #
      # Configure: GitHub → Settings → Secrets → Actions → New secret named
      # `CI_FAILURE_WEBHOOK_URL`. Slack incoming webhook URL works directly.
      # Discord URLs work too if you append `/slack` to the webhook URL —
      # Discord's Slack-compat endpoint accepts the same payload shape.
      - name: Notify webhook on failure
        if: failure() && github.event_name != 'pull_request' && env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.CI_FAILURE_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "{\"text\":\"❌ e2e failed on \`${{ github.ref_name }}\` — <${RUN_URL}|view run>\nCommit: \`${{ github.sha }}\` by ${{ github.actor }}\nEvent: ${{ github.event_name }}\"}" \
            "$WEBHOOK_URL" || echo "Webhook POST failed; not blocking the run."
