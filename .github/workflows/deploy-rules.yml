name: Deploy Rules & Indexes

# Auth: FIREBASE_TOKEN secret (firebase login:ci output) — see CLAUDE.md.
on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"
      - ".github/workflows/deploy-rules.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rules-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Firestore rules + indexes + Storage rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13.29.x

      - name: Deploy
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        # `set -o pipefail` is critical: without it, `firebase deploy ...
        # | tail -120` returns tail's exit code (always 0), so an auth /
        # deploy failure looks "green" in the Actions UI. We learned this
        # the hard way — favicons + rule fix silently failed to deploy
        # for several commits before anyone noticed.
        shell: bash
        run: |
          set -e -o pipefail
          firebase --version
          firebase deploy \
            --only firestore:rules,firestore:indexes,storage \
            --project momento-b23c0 \
            --non-interactive \
            --debug 2>&1 | tail -120

      # Slack ping on failure. No-op when CI_FAILURE_WEBHOOK_URL isn't set.
      # Mirrors the step in e2e.yml.
      - name: Notify webhook on failure
        if: failure() && github.event_name != 'pull_request' && env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.CI_FAILURE_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "{\"text\":\"❌ Deploy Rules failed on \`${{ github.ref_name }}\` — <${RUN_URL}|view run>\nCommit: \`${{ github.sha }}\` by ${{ github.actor }}\"}" \
            "$WEBHOOK_URL" || echo "Webhook POST failed; not blocking the run."
